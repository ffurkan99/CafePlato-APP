# Codemagic CI/CD configuration for CafePlato Flutter App
workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branches:
        - main
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Flutter analyze
        script: |
          flutter analyze
      - name: Flutter test
        script: |
          flutter test
      - name: Build Android APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/apk/release/*.apk

  ios-workflow:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branches:
        - main
    scripts:
      - name: Get dependencies
        script: |
          flutter packages pub get
      - name: Build iOS IPA (Unsigned / Simulator/development)
        script: |
          # Build unsigned ios package (use build ipa with --no-codesign)
          flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
