# Codemagic CI/CD configuration for CafePlato Flutter App

workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 30
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main

    scripts:
      - name: Set up local.properties
        script: |
          set -e
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Get Flutter packages
        script: |
          set -e
          flutter pub get

      - name: Flutter analyze
        script: |
          set -e
          flutter analyze

      - name: Flutter test
        script: |
          set -e
          flutter test

      - name: Build Android APK
        script: |
          set -e
          flutter build apk --release

    artifacts:
      - build/app/outputs/apk/release/*.apk


  ios-workflow:
    name: iOS Unsigned Device Build
    max_build_duration: 30
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main

    scripts:
      - name: Get Flutter packages
        script: |
          set -e
          flutter pub get

      - name: Build unsigned iOS app for device
        script: |
          set -e

          # Gerçek iPhone mimarisi için imzasız Runner.app üretir.
          # Simulator build değildir.
          flutter build ios --release --no-codesign

          APP_PATH="$CM_BUILD_DIR/build/ios/iphoneos/Runner.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Runner.app bulunamadı:"
            echo "$APP_PATH"

            echo "build/ios içeriği:"
            find "$CM_BUILD_DIR/build/ios" -maxdepth 4 -print || true

            exit 1
          fi

          echo "Runner.app başarıyla oluşturuldu:"
          ls -lah "$APP_PATH"

      - name: Package unsigned iOS artifacts
        script: |
          set -e

          APP_PATH="$CM_BUILD_DIR/build/ios/iphoneos/Runner.app"
          OUTPUT_DIR="$CM_BUILD_DIR/build/ios/export"
          PAYLOAD_DIR="$OUTPUT_DIR/Payload"

          rm -rf "$OUTPUT_DIR"
          mkdir -p "$PAYLOAD_DIR"

          # Runner.app dosyasını Payload klasörüne kopyala.
          cp -R "$APP_PATH" "$PAYLOAD_DIR/Runner.app"

          # 1. Senin eski yöntemde kullandığın Runner.app ZIP dosyası.
          # ZIP açıldığında Runner.app çıkar.
          /usr/bin/ditto \
            -c \
            -k \
            --sequesterRsrc \
            --keepParent \
            "$APP_PATH" \
            "$OUTPUT_DIR/CafePlato-RunnerApp.zip"

          # 2. Hazır Payload klasörü içeren ZIP dosyası.
          # ZIP açıldığında Payload/Runner.app çıkar.
          cd "$OUTPUT_DIR"

          /usr/bin/ditto \
            -c \
            -k \
            --sequesterRsrc \
            --keepParent \
            Payload \
            CafePlato-Payload.zip

          # 3. Aynı Payload paketinin doğrudan .ipa uzantılı hâli.
          cp CafePlato-Payload.zip CafePlato-unsigned.ipa

          echo ""
          echo "Oluşturulan dosyalar:"
          ls -lah "$OUTPUT_DIR"

          echo ""
          echo "Payload yapısı:"
          find "$PAYLOAD_DIR" -maxdepth 2 -print

    artifacts:
      - build/ios/export/CafePlato-RunnerApp.zip
      - build/ios/export/CafePlato-Payload.zip
      - build/ios/export/CafePlato-unsigned.ipa
      - /tmp/xcodebuild_logs/*.log